# 1. 이 워크플로우의 이름입니다. GitHub Actions 탭에 표시됩니다.
name: Seibro Data Scraper

# 2. 언제 실행할지 결정합니다.
on:
  schedule:
    # cron 설정: 분 시 일 월 요일 (UTC 기준)
    # '0 0 * * *'은 한국 시간으로 매일 오전 9시를 의미합니다.
    - cron: '0 0 * * *'
  workflow_dispatch: # 중요! GitHub 웹사이트에서 'Run' 버튼을 눌러 수동 실행할 수 있게 해줍니다.

# 3. 실제로 수행할 작업(Job)들입니다.
jobs:
  build:
    runs-on: ubuntu-latest # 최신 리눅스 환경에서 실행합니다.

    steps:
      # (1) GitHub에 올린 내 코드를 내려받습니다.
      - name: Checkout code
        uses: actions/checkout@v3

      # (2) 파이썬 환경을 설치합니다.
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # (3) 크롤링에 필요한 라이브러리들을 설치합니다.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium supabase python-dotenv

      # (4) 서버용 크롬 브라우저를 설치합니다. (셀레니움 실행용)
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # (5) 작성한 파이썬 스크립트를 실행합니다.
      - name: Run Scraper
        env:
          # GitHub Secrets에 등록한 변수들을 여기서 불러와서 파이썬에게 전달합니다.
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: python src/scripts/scraper.py